name: Unity Tests

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

jobs:
  testPlayMode:
    name: Test EditMode
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        projectPath:
          - empty-unity-project

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone empty Unity project
        run: |
          git clone https://DanilChizhikov:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/DanilChizhikov/empty-unity-project.git empty-unity-project

      - name: Copy source into Unity project
        run: |
          mkdir -p ${{ matrix.projectPath }}/Assets/sources

          shopt -s dotglob

          for item in *; do
            case "$item" in
              ${{ matrix.projectPath }}|.git|.github|.gitignore|.gitattributes)
                echo "Skipping $item"
                ;;
              *)
                cp -R "$item" ${{ matrix.projectPath }}/Assets/sources/
                ;;
            esac
          done

      - name: Run Unity Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.3.62f2
          projectPath: ${{ matrix.projectPath }}
          testMode: editmode
